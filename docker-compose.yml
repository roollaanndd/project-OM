# OMDC Docker Compose — Production Deployment
#
# Usage:
#   docker-compose up -d
#
# This will start:
# - OMDC web app (port 3000)
# - PostgreSQL database (port 5432) — for production data
# - Redis (port 6379) — for session cache & queue
#
# For separate platform deployment, see individual docker-compose files.

version: "3.8"

services:
  # ============ OMDC Application ============
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omdc-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://omdc:${DB_PASSWORD}@db:5432/omdc?schema=public
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://omdc.id
      - NEXT_PUBLIC_APP_URL=https://omdc.id
      - NEXT_PUBLIC_API_URL=https://api.omdc.id
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - omdc-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/booking"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ============ PostgreSQL Database ============
  db:
    image: postgres:16-alpine
    container_name: omdc-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=omdc
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=omdc
    ports:
      - "5432:5432"
    volumes:
      - omdc-db-data:/var/lib/postgresql/data
    networks:
      - omdc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omdc"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ Redis (for session cache & queue) ============
  redis:
    image: redis:7-alpine
    container_name: omdc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - omdc-redis-data:/data
    networks:
      - omdc-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

  # ============ Nginx Reverse Proxy ============
  nginx:
    image: nginx:alpine
    container_name: omdc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - omdc-network

volumes:
  omdc-db-data:
  omdc-redis-data:

networks:
  omdc-network:
    driver: bridge
