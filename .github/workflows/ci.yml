name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Lint
        run: bun run lint
      - name: Tests
        run: npx vitest run
      - name: Build
        run: bun run build
        env:
          DATABASE_URL: "file:./db/test.db"
          NEXTAUTH_SECRET: "test-secret"
